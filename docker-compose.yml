version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hms_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hotel_db
    ports:
      - "5432:5432"
    volumes:
      - hms_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - hms_redisdata:/data

volumes:
  hms_pgdata:
  hms_redisdata:
